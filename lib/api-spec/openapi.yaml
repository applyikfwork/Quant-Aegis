      properties:
        id:
          type: integer
        symbol:
          type: string
        side:
          type: string
        entryPrice:
          type: number
        currentPrice:
          type: number
        stopLoss:
          type: number
        stopDistance:
          type: number
        stopDistancePct:
          type: number
        quantity:
          type: number
        positionValue:
          type: number
        maxLoss:
          type: number
        riskPct:
          type: number
        liquidationPrice:
          type: number
        liquidationBuffer:
          type: number
        hasStopLoss:
          type: boolean

    RiskVar:
      type: object
      required: [historicalVar95, historicalVar99, simulationVar95, simulationVar99, expectedShortfall95, expectedShortfall99, portfolioVolatility, dailyVar, weeklyVar, monthlyVar]
      properties:
        historicalVar95:
          type: number
        historicalVar99:
          type: number
        simulationVar95:
          type: number
        simulationVar99:
          type: number
        expectedShortfall95:
          type: number
        expectedShortfall99:
          type: number
        portfolioVolatility:
          type: number
        dailyVar:
          type: number
        weeklyVar:
          type: number
        monthlyVar:
          type: number

